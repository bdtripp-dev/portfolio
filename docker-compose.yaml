services:
  portfolio:
    image: bdtrippdev/portfolio:${TAG}
    restart: always
    labels:
      - "deunhealth.restart=true"
    environment:
      - VIRTUAL_HOST=${VIRTUAL_HOSTS}
      - ENV_NAME=${ENV_NAME}
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/ || exit 1"]
      interval: 30s
      start_period: 20s
    networks:
      - public_net
networks:
  public_net:
    name: ${ENV_NAME}_public
    external: true
